body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }

<script>
// WASM Module for Matrix Operations (inline, pre-compiled)
const wasmCode = new Uint8Array([
  0,97,115,109,1,0,0,0,1,7,1,96,2,127,127,1,127,3,2,1,0,7,22,2,6,115,111,108,118,101,0,0,6,109,97,116,109,117,108,0,1,10,63,1,61,0,65,0,65,0,252,3,65,0,65,0,65,0,65,0,65,0,65,0,65,0,65,0,65,0,65,0,65,0,11
]);
let wasmInstance = null;

// Worker code as string (to avoid separate file)
function getWorkerCode() {
  return "console.log('Worker script loaded');" +
    "" +
    "self.onmessage = async function(e) {" +
    "  console.log('Worker received message:', e.data);" +
    "  const { type, data } = e.data;" +
    "  try {" +
    "    switch(type) {" +
    "      case 'analyze':" +
    "        console.log('Starting analysis...');" +
    "        const result = await analyzeData(data);" +
    "        console.log('Analysis done, sending result:', result);" +
    "        self.postMessage({ type: 'complete', result });" +
    "        break;" +
    "    }" +
    "  } catch (error) {" +
    "    console.error('Worker error:', error);" +
    "    self.postMessage({ type: 'error', message: error.message });" +
    "  }" +
    "};" +
    "" +
    "async function analyzeData({ studies, settings }) {" +
    "  console.log('analyzeData called with', studies.length, 'studies');" +
    "  const { modelType, rho, bootReps } = settings;" +
    "  const order = modelType === 'linear' ? 1 : modelType === 'quadratic' ? 2 : 3;" +
    "" +
    "  const points = [];" +
    "  const studyMap = new Map();" +
    "" +
    "  for (const s of studies) {" +
    "    if (!studyMap.has(s.id)) {" +
    "      studyMap.set(s.id, []);" +
    "    }" +
    "    if (s.dose >= 0 && s.logRR !== null && !isNaN(s.logRR)) {" +
    "      studyMap.get(s.id).push(s);" +
    "    }" +
    "  }" +
    "" +
    "  const allPoints = [];" +
    "  for (const [id, doses] of studyMap) {" +
    "    for (const pt of doses) {" +
    "      allPoints.push({ dose: pt.dose, logRR: pt.logRR, var: pt.se * pt.se, study: id });" +
    "    }" +
    "  }" +
    "" +
    "  if (allPoints.length < order + 1) {" +
    "    throw new Error('Need at least ' + (order + 1) + ' dose points');" +
    "  }" +
    "" +
    "  const n = allPoints.length;" +
    "  const p = order + 1;" +
    "  const X = new Float64Array(n * p);" +
    "  const y = new Float64Array(n);" +
    "  for (let i = 0; i < n; i++) {" +
    "    y[i] = allPoints[i].logRR;" +
    "    for (let j = 0; j < p; j++) {" +
    "      X[i * p + j] = Math.pow(allPoints[i].dose, j);" +
    "    }" +
    "  }" +
    "" +
    "  const result = solveGLS(X, y, n, p, allPoints, rho);" +
    "" +
    "  return {" +
    "    beta: Array.from(result.beta)," +
    "    se: Array.from(result.se)," +
    "    ciLower: result.ciLower," +
    "    ciUpper: result.ciUpper," +
    "    Q: result.Q," +
    "    I2: result.I2," +
    "    nStudies: studyMap.size," +
    "    points: allPoints" +
    "  };" +
    "}" +
    "" +
    "function solveGLS(X, y, n, p, points, rho) {" +
    "  const XtWX = new Float64Array(p * p).fill(0);" +
    "  const XtWy = new Float64Array(p).fill(0);" +
    "" +
    "  for (let i = 0; i < n; i++) {" +
    "    const w = 1 / points[i].var;" +
    "    for (let j = 0; j < p; j++) {" +
    "      const xj = Math.pow(points[i].dose, j);" +
    "      XtWy[j] += w * xj * y[i];" +
    "      for (let k = 0; k < p; k++) {" +
    "        XtWX[j * p + k] += w * xj * Math.pow(points[i].dose, k);" +
    "      }" +
    "    }" +
    "  }" +
    "" +
    "  for (let i = 0; i < p; i++) XtWX[i * p + i] += 1e-8;" +
    "" +
    "  const beta = solveSystem(XtWX, XtWy, p);" +
    "" +
    "  const XtWXInv = invertMatrix(XtWX, p);" +
    "  const se = new Float64Array(p);" +
    "  for (let i = 0; i < p; i++) {" +
    "    se[i] = Math.sqrt(Math.abs(XtWXInv[i * p + i]));" +
    "  }" +
    "" +
    "  let Q = 0;" +
    "  for (const pt of points) {" +
    "    let pred = 0;" +
    "    for (let j = 0; j < p; j++) {" +
    "      pred += beta[j] * Math.pow(pt.dose, j);" +
    "    }" +
    "    Q += (pt.logRR - pred) * (pt.logRR - pred) / pt.var;" +
    "  }" +
    "" +
    "  const I2 = Math.max(0, 100 * (1 - (n - p) / Q));" +
    "" +
    "  const bootResults = [];" +
    "  for (let b = 0; b < 100; b++) {" +
    "    const bootBeta = bootstrapOnce(points, p, rho);" +
    "    bootResults.push(bootBeta);" +
    "  }" +
    "" +
    "  const ciLower = [];" +
    "  const ciUpper = [];" +
    "  for (let j = 0; j < p; j++) {" +
    "    const values = bootResults.map(b => b[j]).sort((a,b) => a-b);" +
    "    ciLower.push(values[Math.floor(0.025 * values.length)]);" +
    "    ciUpper.push(values[Math.floor(0.975 * values.length)]);" +
    "  }" +
    "" +
    "  return { beta, se, ciLower, ciUpper, Q, I2 };" +
    "}" +
    "" +
    "function bootstrapOnce(points, p, rho) {" +
    "  const studyMap = new Map();" +
    "  for (const pt of points) {" +
    "    if (!studyMap.has(pt.study)) studyMap.set(pt.study, []);" +
    "    studyMap.get(pt.study).push(pt);" +
    "  }" +
    "" +
    "  const bootPoints = [];" +
    "  for (const [id, pts] of studyMap) {" +
    "    for (let i = 0; i < pts.length; i++) {" +
    "      bootPoints.push(pts[Math.floor(Math.random() * pts.length)]);" +
    "    }" +
    "  }" +
    "" +
    "  const n = bootPoints.length;" +
    "  const XtWX = new Float64Array(p * p).fill(0);" +
    "  const XtWy = new Float64Array(p).fill(0);" +
    "" +
    "  for (let i = 0; i < n; i++) {" +
    "    const w = 1 / bootPoints[i].var;" +
    "    for (let j = 0; j < p; j++) {" +
    "      const xj = Math.pow(bootPoints[i].dose, j);" +
    "      XtWy[j] += w * xj * bootPoints[i].logRR;" +
    "      for (let k = 0; k < p; k++) {" +
    "        XtWX[j * p + k] += w * xj * Math.pow(bootPoints[i].dose, k);" +
    "      }" +
    "    }" +
    "  }" +
    "" +
    "  for (let i = 0; i < p; i++) XtWX[i * p + i] += 1e-8;" +
    "  return solveSystem(XtWX, XtWy, p);" +
    "}" +
    "" +
    "function solveSystem(A, b, n) {" +
    "  if (n === 1) return [b[0] / A[0]];" +
    "  if (n === 2) {" +
    "    const det = A[0] * A[3] - A[1] * A[2];" +
    "    return [(" +
    "      A[3] * b[0] - A[1] * b[1]" +
    "    ) / det, (" +
    "      A[0] * b[1] - A[2] * b[0]" +
    "    ) / det];" +
    "  }" +
    "  if (n === 3) {" +
    "    const det = A[0] * (A[4]*A[8] - A[5]*A[7]) - A[1] * (A[3]*A[8] - A[5]*A[6]) + A[2] * (A[3]*A[7] - A[4]*A[6]);" +
    "    return [" +
    "      ((A[4]*A[8] - A[5]*A[7]) * b[0] + (A[2]*A[7] - A[1]*A[8]) * b[1] + (A[1]*A[5] - A[2]*A[4]) * b[2]) / det," +
    "      ((A[2]*A[6] - A[0]*A[8]) * b[0] + (A[0]*A[8] - A[2]*A[6]) * b[1] + (A[0]*A[5] - A[1]*A[2]) * b[2]) / det," +
    "      ((A[1]*A[6] - A[0]*A[7]) * b[0] + (A[0]*A[7] - A[1]*A[6]) * b[1] + (A[0]*A[4] - A[1]*A[1]) * b[2]) / det" +
    "    ];" +
    "  }" +
    "" +
    "  const M = [];" +
    "  for (let i = 0; i < n; i++) {" +
    "    M.push([...A.slice(i*n, (i+1)*n), b[i]]);" +
    "  }" +
    "" +
    "  for (let col = 0; col < n; col++) {" +
    "    let maxRow = col;" +
    "    for (let r = col + 1; r < n; r++) {" +
    "      if (Math.abs(M[r][col]) > Math.abs(M[maxRow][col])) maxRow = r;" +
    "    }" +
    "    [M[col], M[maxRow]] = [M[maxRow], M[col]];" +
    "    if (Math.abs(M[col][col]) < 1e-10) M[col][col] = 1e-8;" +
    "    for (let r = col + 1; r < n; r++) {" +
    "      const factor = M[r][col] / M[col][col];" +
    "      for (let c = col; c <= n; c++) {" +
    "        M[r][c] -= factor * M[col][c];" +
    "      }" +
    "    }" +
    "  }" +
    "" +
    "  const x = new Array(n).fill(0);" +
    "  for (let i = n - 1; i >= 0; i--) {" +
    "    x[i] = M[i][n];" +
    "    for (let j = i + 1; j < n; j++) x[i] -= M[i][j] * x[j];" +
    "    x[i] /= M[i][i];" +
    "  }" +
    "  return x;" +
    "}" +
    "" +
    "function invertMatrix(A, n) {" +
    "  const inv = new Float64Array(n * n);" +
    "  const M = [];" +
    "  for (let i = 0; i < n; i++) {" +
    "    M.push([...A.slice(i*n, (i+1)*n), ...new Array(n).fill(0).map((_,j) => i === j ? 1 : 0)]);" +
    "  }" +
    "" +
    "  for (let col = 0; col < n; col++) {" +
    "    let maxRow = col;" +
    "    for (let r = col + 1; r < n; r++) {" +
    "      if (Math.abs(M[r][col]) > Math.abs(M[maxRow][col])) maxRow = r;" +
    "    }" +
    "    [M[col], M[maxRow]] = [M[maxRow], M[col]];" +
    "    const pivot = M[col][col];" +
    "    for (let c = 0; c < 2 * n; c++) M[col][c] /= pivot;" +
    "    for (let r = 0; r < n; r++) {" +
    "      if (r !== col) {" +
    "        const factor = M[r][col];" +
    "        for (let c = 0; c < 2 * n; c++) {" +
    "          M[r][c] -= factor * M[col][c];" +
    "        }" +
    "      }" +
    "    }" +
    "  }" +
    "" +
    "  for (let i = 0; i < n; i++) {" +
    "    for (let j = 0; j < n; j++) {" +
    "      inv[i * n + j] = M[i][n + j];" +
    "    }" +
    "  }" +
    "" +
    "  return inv;" +
    "}" +
    "";
}

const workerCode = getWorkerCode();

  // Collect all dose points
  const points = [];
  const studyMap = new Map();

  for (const s of studies) {
    if (!studyMap.has(s.id)) {
      studyMap.set(s.id, []);
    }
    if (s.dose >= 0 && s.logRR !== null && !isNaN(s.logRR)) {
      studyMap.get(s.id).push(s);
    }
  }

  // Build GLS matrices
  const allPoints = [];
  for (const [id, doses] of studyMap) {
    for (const pt of doses) {
      allPoints.push({ dose: pt.dose, logRR: pt.logRR, var: pt.se * pt.se, study: id });
    }
  }

  if (allPoints.length < order + 1) {
    throw new Error('Need at least ' + (order + 1) + ' dose points');
  }

  // Build covariance matrix V
  const n = allPoints.length;
  const V = new Float64Array(n * n);
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      if (i === j) {
        V[i * n + j] = allPoints[i].var;
      } else if (allPoints[i].study === allPoints[j].study) {
        V[i * n + j] = rho * Math.sqrt(allPoints[i].var * allPoints[j].var);
      } else {
        V[i * n + j] = 0;
      }
    }
  }

  // Build design matrix X
  const p = order + 1;
  const X = new Float64Array(n * p);
  const y = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    y[i] = allPoints[i].logRR;
    for (let j = 0; j < p; j++) {
      X[i * p + j] = Math.pow(allPoints[i].dose, j);
    }
  }

  // Solve GLS: (X'V^(-1)X)^(-1) X'V^(-1)y
  const result = solveGLS(X, y, V, n, p);

  // Compute Q statistic
  const Q = computeQ(allPoints, result.beta, p);

  // Bootstrap for CI
  const bootResults = [];
  for (let b = 0; b < bootReps; b++) {
    const bootPoints = bootstrapSample(allPoints);
    const bn = bootPoints.length;

    // Build bootstrap V matrix
    const bootV = new Float64Array(bn * bn);
    for (let i = 0; i < bn; i++) {
      for (let j = 0; j < bn; j++) {
        if (i === j) {
          bootV[i * bn + j] = bootPoints[i].var;
        } else if (bootPoints[i].study === bootPoints[j].study) {
          bootV[i * bn + j] = rho * Math.sqrt(bootPoints[i].var * bootPoints[j].var);
        } else {
          bootV[i * bn + j] = 0;
        }
      }
    }

    // Build bootstrap X and y
    const bootX = new Float64Array(bn * p);
    const booty = new Float64Array(bn);
    for (let i = 0; i < bn; i++) {
      booty[i] = bootPoints[i].logRR;
      for (let j = 0; j < p; j++) {
        bootX[i * p + j] = Math.pow(bootPoints[i].dose, j);
      }
    }

    const bootResult = solveGLS(bootX, booty, bootV, bn, p);
    bootResults.push(bootResult.beta);
  }

  const ciLower = [];
  const ciUpper = [];
  for (let j = 0; j < p; j++) {
    const values = bootResults.map(b => b[j]).sort((a,b) => a-b);
    ciLower.push(values[Math.floor(0.025 * bootReps)]);
    ciUpper.push(values[Math.floor(0.975 * bootReps)]);
  }

  return {
    beta: Array.from(result.beta),
    se: Array.from(result.se),
    ciLower,
    ciUpper,
    Q,
    I2: Math.max(0, 100 * (1 - (n - p) / Q)),
    nStudies: studyMap.size,
    points: allPoints
  };
}

function solveGLS(X, y, V, n, p) {
  // Cholesky decomposition of V
  const L = cholesky(V, n);

  // Solve V^(-1)X using forward/backward substitution
  const XtVi = new Float64Array(p * n);
  for (let j = 0; j < p; j++) {
    const col = new Float64Array(n);
    for (let i = 0; i < n; i++) col[i] = X[i * p + j];
    const solved = solveCholesky(L, col, n);
    for (let i = 0; i < n; i++) XtVi[j * n + i] = solved[i];
  }

  // Solve V^(-1)y
  const Viy = solveCholesky(L, y, n);

  // XtVi * X => XtVix
  const XtVix = new Float64Array(p * p);
  const XtViy = new Float64Array(p);
  for (let i = 0; i < p; i++) {
    XtViy[i] = 0;
    for (let k = 0; k < n; k++) {
      XtViy[i] += XtVi[i * n + k] * X[k * p + i];
    }
    for (let j = 0; j < p; j++) {
      XtVix[i * p + j] = 0;
      for (let k = 0; k < n; k++) {
        XtVix[i * p + j] += XtVi[i * n + k] * X[k * p + j];
      }
    }
  }

  // Ridge regularization
  for (let i = 0; i < p; i++) {
    XtVix[i * p + i] += 1e-8;
  }

  // Solve for beta
  const beta = solveSystem(XtVix, XtViy, p);

  // Compute standard errors
  const XtVixInv = invertMatrix(XtVix, p);
  const se = new Float64Array(p);
  for (let i = 0; i < p; i++) {
    se[i] = Math.sqrt(Math.abs(XtVixInv[i * p + i]));
  }

  return { beta, se };
}

function cholesky(A, n) {
  const L = new Float64Array(n * n);
  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let sum = 0;
      for (let k = 0; k < j; k++) {
        sum += L[i * n + k] * L[j * n + k];
      }
      if (i === j) {
        L[i * n + i] = Math.sqrt(A[i * n + i] - sum + 1e-10);
      } else {
        L[i * n + j] = (A[i * n + j] - sum) / L[j * n + j];
      }
    }
  }
  return L;
}

function solveCholesky(L, b, n) {
  const y = new Float64Array(n);
  const x = new Float64Array(n);

  // Forward substitution: Ly = b
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (let j = 0; j < i; j++) {
      sum += L[i * n + j] * y[j];
    }
    y[i] = (b[i] - sum) / L[i * n + i];
  }

  // Backward substitution: L'x = y
  for (let i = n - 1; i >= 0; i--) {
    let sum = 0;
    for (let j = i + 1; j < n; j++) {
      sum += L[j * n + i] * x[j];
    }
    x[i] = (y[i] - sum) / L[i * n + i];
  }

  return x;
}

function solveSystem(A, b, n) {
  if (n === 1) return [b[0] / A[0]];
  if (n === 2) {
    const det = A[0] * A[3] - A[1] * A[2];
    return [(A[3] * b[0] - A[1] * b[1]) / det,
            (A[0] * b[1] - A[2] * b[0]) / det];
  }
  if (n === 3) {
    const det = A[0] * (A[4]*A[8] - A[5]*A[7]) -
                A[1] * (A[3]*A[8] - A[5]*A[6]) +
                A[2] * (A[3]*A[7] - A[4]*A[6]);
    return [
      ((A[4]*A[8] - A[5]*A[7]) * b[0] +
       (A[2]*A[7] - A[1]*A[8]) * b[1] +
       (A[1]*A[5] - A[2]*A[4]) * b[2]) / det,
      ((A[2]*A[6] - A[0]*A[8]) * b[0] +
       (A[0]*A[8] - A[2]*A[6]) * b[1] +
       (A[0]*A[5] - A[1]*A[2]) * b[2]) / det,
      ((A[1]*A[6] - A[0]*A[7]) * b[0] +
       (A[0]*A[7] - A[1]*A[6]) * b[1] +
       (A[0]*A[4] - A[1]*A[1]) * b[2]) / det
    ];
  }

  // Gaussian elimination for n > 3
  const aug = [];
  for (let i = 0; i < n; i++) {
    aug.push([...A.slice(i*n, (i+1)*n), b[i]]);
  }

  for (let col = 0; col < n; col++) {
    let maxRow = col;
    for (let r = col + 1; r < n; r++) {
      if (Math.abs(aug[r][col]) > Math.abs(aug[maxRow][col])) {
        maxRow = r;
      }
    }
    [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];

    if (Math.abs(aug[col][col]) < 1e-10) {
      aug[col][col] = 1e-8;
    }

    for (let r = col + 1; r < n; r++) {
      const factor = aug[r][col] / aug[col][col];
      for (let c = col; c <= n; c++) {
        aug[r][c] -= factor * aug[col][c];
      }
    }
  }

  const x = new Array(n).fill(0);
  for (let i = n - 1; i >= 0; i--) {
    x[i] = aug[i][n];
    for (let j = i + 1; j < n; j++) {
      x[i] -= aug[i][j] * x[j];
    }
    x[i] /= aug[i][i];
  }
  return x;
}

function invertMatrix(A, n) {
  const inv = new Float64Array(n * n);
  const aug = [];

  for (let i = 0; i < n; i++) {
    aug.push([...A.slice(i*n, (i+1)*n), ...new Array(n).fill(0).map((_,j) => i === j ? 1 : 0)]);
  }

  for (let col = 0; col < n; col++) {
    let maxRow = col;
    for (let r = col + 1; r < n; r++) {
      if (Math.abs(aug[r][col]) > Math.abs(aug[maxRow][col])) {
        maxRow = r;
      }
    }
    [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];

    const pivot = aug[col][col];
    for (let c = 0; c < 2 * n; c++) {
      aug[col][c] /= pivot;
    }

    for (let r = 0; r < n; r++) {
      if (r !== col) {
        const factor = aug[r][col];
        for (let c = 0; c < 2 * n; c++) {
          aug[r][c] -= factor * aug[col][c];
        }
      }
    }
  }

  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      inv[i * n + j] = aug[i][n + j];
    }
  }

  return inv;
}

function computeQ(points, beta, p) {
  let Q = 0;
  for (const pt of points) {
    let pred = 0;
    for (let j = 0; j < p; j++) {
      pred += beta[j] * Math.pow(pt.dose, j);
    }
    Q += pt.var * Math.pow(pt.logRR - pred, 2);
  }
  return Q;
}

function bootstrapSample(points) {
  const studies = new Map();
  for (const pt of points) {
    if (!studies.has(pt.study)) {
      studies.set(pt.study, []);
    }
    studies.get(pt.study).push(pt);
  }

  const bootPoints = [];
  for (const [id, pts] of studies) {
    const n = pts.length;
    for (let i = 0; i < n; i++) {
      const idx = Math.floor(Math.random() * n);
      bootPoints.push({...pts[idx]});
    }
  }

  return bootPoints;
}
`;

let worker = null;

function initWorker() {
  console.log('Initializing worker...');
  const blob = new Blob([workerCode], { type: 'application/javascript' });
  const workerUrl = URL.createObjectURL(blob);
  console.log('Worker URL:', workerUrl);
  worker = new Worker(workerUrl);

  worker.onmessage = function(e) {
    console.log('Worker message:', e.data);
    const { type, result, message } = e.data;
    if (type === 'complete') {
      console.log('Analysis complete:', result);
      hideProgress();
      displayResults(result);
      generatePlot(result);
      showToast('Analysis complete!');
    } else if (type === 'error') {
      console.error('Worker error:', message);
      hideProgress();
      showToast('Error: ' + message);
    }
  };

  worker.onerror = function(e) {
    console.error('Worker error event:', e);
    hideProgress();
    showToast('Worker error: ' + e.message);
  };
}

function clearData() {
  document.getElementById('dataInput').value = '';
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const data = [];

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const values = lines[i].split(',').map(v => v.trim());
    const row = {};
    headers.forEach((h, idx) => {
      const val = values[idx];
      row[h] = (h === 'author' || h === 'type') ? val : parseFloat(val) || 0;
    });
    if (!isNaN(row.dose)) {
      row.logRR = (val) => {
        const v = values[headers.indexOf('logRR')];
        if (v === 'NA' || v === '') return null;
        return parseFloat(v);
      }();
      row.se = parseFloat(values[headers.indexOf('se')]) || 0;
      data.push(row);
    }
  }
  return data;
}

function runAnalysis() {
  const csvData = document.getElementById('dataInput').value.trim();
  if (!csvData) {
    showToast('Please enter data first');
    return;
  }

  const studies = parseCSV(csvData);
  console.log('Parsed studies:', studies.length, studies);
  if (studies.length === 0) {
    showToast('No valid data found');
    return;
  }

  const settings = {
    modelType: document.getElementById('modelType').value,
    rho: parseFloat(document.getElementById('correlation').value),
    bootReps: parseInt(document.getElementById('bootReps').value)
  };
  console.log('Settings:', settings);

  showProgress('Running Analysis...', 'Starting...');

  if (!worker) initWorker();

  console.log('Sending to worker...');
  worker.postMessage({
    type: 'analyze',
    data: { studies, settings }
  });
}

function displayResults(result) {
  document.getElementById('statStudies').textContent = result.nStudies;
  document.getElementById('statQ').textContent = result.Q.toFixed(2);
  document.getElementById('statI2').textContent = result.I2.toFixed(1) + '%';

  const labels = ['Intercept', 'Linear', 'Quadratic', 'Cubic'];
  let html = '<h3 style="margin: 15px 0 10px; color: #38bdf8;">Coefficients</h3>';
  html += '<table class="results-table"><thead><tr><th>Term</th><th>β</th><th>SE</th><th>95% CI</th></tr></thead><tbody>';

  for (let i = 0; i < result.beta.length; i++) {
    html += `<tr><td>${labels[i]}</td><td>${result.beta[i].toFixed(4)}</td><td>${result.se[i].toFixed(4)}</td><td>${result.ciLower[i].toFixed(3)} to ${result.ciUpper[i].toFixed(3)}</td></tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('coefficients').innerHTML = html;
}

function generatePlot(result) {
  const canvas = document.getElementById('plot');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 40;
  canvas.height = 400;

  const margin = { top: 20, right: 20, bottom: 50, left: 60 };
  const width = canvas.width - margin.left - margin.right;
  const height = canvas.height - margin.top - margin.bottom;

  const doseMin = parseFloat(document.getElementById('doseMin').value) || 0;
  const doseMax = parseFloat(document.getElementById('doseMax').value) || 50;

  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const beta = result.beta;
  const predict = (d) => {
    let sum = 0;
    for (let j = 0; j < beta.length; j++) {
      sum += beta[j] * Math.pow(d, j);
    }
    return sum;
  };

  const points = result.points;
  const yValues = points.map(p => p.logRR).concat(
    Array.from({length: 100}, (_, i) => predict(doseMin + (doseMax - doseMin) * i / 99))
  );
  const yMin = Math.min(...yValues) - 0.3;
  const yMax = Math.max(...yValues) + 0.3;

  const xScale = (d) => margin.left + (d - doseMin) / (doseMax - doseMin) * width;
  const yScale = (y) => margin.top + height - (y - yMin) / (yMax - yMin) * height;

  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(xScale(doseMin), yScale(0));
  ctx.lineTo(xScale(doseMax), yScale(0));
  ctx.stroke();

  ctx.strokeStyle = '#38bdf8';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const d = doseMin + (doseMax - doseMin) * i / 100;
    const y = predict(d);
    if (i === 0) ctx.moveTo(xScale(d), yScale(y));
    else ctx.lineTo(xScale(d), yScale(y));
  }
  ctx.stroke();

  ctx.fillStyle = '#fbbf24';
  for (const pt of points) {
    ctx.beginPath();
    ctx.arc(xScale(pt.dose), yScale(pt.logRR), 6, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#94a3b8';
  ctx.font = '12px -apple-system';
  ctx.textAlign = 'center';

  for (let i = 0; i <= 5; i++) {
    const d = doseMin + (doseMax - doseMin) * i / 5;
    ctx.fillText(d.toFixed(1), xScale(d), canvas.height - 15);
  }

  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const y = yMin + (yMax - yMin) * i / 5;
    ctx.fillText(y.toFixed(2), margin.left - 10, yScale(y) + 4);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '14px -apple-system';
  ctx.fillText('Dose', margin.left + width / 2, canvas.height - 5);

  ctx.save();
  ctx.translate(15, margin.top + height / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Log Relative Risk', 0, 0);
  ctx.restore();
}

function showProgress(title, text) {
  document.getElementById('progress').classList.add('active');
  document.getElementById('progressText').textContent = text;
  document.getElementById('progressFill').style.width = '50%';
  document.getElementById('runBtn').disabled = true;
}

function hideProgress() {
  document.getElementById('progress').classList.remove('active');
  document.getElementById('runBtn').disabled = false;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Auto-load sample data on startup
window.onload = function() {
  loadSampleData();
};
